name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          # A placeholder key so the build step (which only type-checks and
          # bundles routes) succeeds without a real secret in CI. Real keys
          # are only ever needed at runtime, never at build time.
          GEMINI_API_KEY: ci-placeholder-key
